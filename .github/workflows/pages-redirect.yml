name: Deploy Pages redirect (dashboard moved to qec-lab)

# The pipeline dashboard moved to https://stavan-jain.github.io/qec-lab/
# (repo Stavan-Jain/qec-lab) in the 2026-07 repo split. This deploys a
# tiny path-preserving redirect so old dashboard links don't 404 or show
# stale data.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pages-redirect.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate redirect site
        run: |
          mkdir -p site
          cat > site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Moved: QECLean pipeline dashboard</title>
            <script>
              location.replace('https://stavan-jain.github.io/qec-lab'
                + location.pathname.replace(/^\/QECLean/, '')
                + location.search + location.hash);
            </script>
            <meta http-equiv="refresh" content="0; url=https://stavan-jain.github.io/qec-lab/">
            <link rel="canonical" href="https://stavan-jain.github.io/qec-lab/">
          </head>
          <body>
            <p>The QECLean pipeline dashboard moved to
               <a href="https://stavan-jain.github.io/qec-lab/">stavan-jain.github.io/qec-lab</a>.</p>
          </body>
          </html>
          EOF
          cp site/index.html site/404.html
          touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
