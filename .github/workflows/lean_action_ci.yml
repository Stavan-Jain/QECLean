name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel any in-progress run on the same ref when a new push lands.
# Prevents the pile-up we saw where 6 concurrent runs all churned through
# docgen for ~2h each.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  pages: write # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      # The gross BB safe-sector floor still has three `native_decide` leaves
      # (MImFloorY0/Y1/Y4, ~3.75 GB each). lake has no `-j`/parallelism flag, so
      # it builds all three concurrently at the tail and exhausts the runner's
      # 16 GB → the job is killed (exit 143). Add swap so the peak spills to disk
      # instead of OOM-ing. Remove once Tier-3 retires those leaves (cf. Y11/Y12).
      - name: Add swap space (BB floor_holds native_decide memory peaks)
        # The runner already has an active /swapfile, so add an extra one on the
        # large /mnt ephemeral disk rather than touching the existing swap.
        run: |
          sudo fallocate -l 12G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h
      - uses: leanprover/lean-action@v1
      # docgen rebuilds API docs for the project + all of mathlib (~1-2h with
      # no cache). Skip it on every push/PR; only run on tag pushes or manual
      # dispatch so day-to-day CI stays fast.
      - if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: leanprover-community/docgen-action@v1
        with:
          # Point `homepage` at a directory that does not exist in the repo.
          # The action's `Check for ${homepage} folder` step then sets
          # `DOCS_EXISTS=false`, so the Jekyll bundle/build steps are skipped
          # (they require a `Gemfile` etc., and we don't track a Jekyll site
          # in the repo — `docs/` is gitignored). API docs still build and
          # upload to GitHub Pages.
          homepage: _no_jekyll_site
