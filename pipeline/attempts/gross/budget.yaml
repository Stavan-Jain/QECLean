moonshot: gross
per_approach_hours: 12         # wall-clock cap per approach
per_approach_iterations: 30    # max proof-state changes (substantive)
total_session_hours: 8         # cap per session before human checkpoint
total_moonshot_hours: 80       # cap across all sessions before forced re-evaluation
approaches_max: 5              # if 5 fail, write up moonshot as failed
escalation_rules:
  no_progress_after_minutes: 60
  spec_doubt_threshold: 2      # if 2 approaches fail same way, suspect the hypothesis
  loose_bound_floor: 4         # if Camion yields d >= K with K < this, treat as red flag for approach A
notes: |
  This is a moonshot, not engineering. Time caps are tight to force early
  surface-and-pivot rather than late capitulation. Each approach must
  produce a final_writeup.md before its budget is recycled.

  Total ceiling = 80h ≈ ~2 weeks at 6h/day. If we hit 80h with no partial
  result, write up the failure and stop — do not extend.
