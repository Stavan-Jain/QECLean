# --- Approach B (closed, negative result) ---
approach_b_outcome: negative-result
approach_b_hours_spent: 4.75
approach_b_target: |
  Lin-Pryadko (arXiv:2306.16400) Statement 12 / Tillich-Zémor analog:
  d(LP[a, b]) >= ⌈min(d_A^⊥, d_B^⊥) / c⌉ where c = |G_a ∩ G_b|.
  For Gross: G_a ∩ G_b = Z_4 × Z_2 = order 8, so denominator is 8.
approach_b_summary: |
  RIGOROUS NEGATIVE RESULT.  Per Lin-Pryadko Sec. IV.F, the
  Statement-12 lower bound satisfies the structural ceiling
  `d_0 ≤ min([G_a : N], [G_b : N])`.  For Gross polynomials,
  the verified subgroups G_a = Z_4 × Z_6, G_b = Z_12 × Z_2,
  N = G_a ∩ G_b = Z_4 × Z_2 give [G_a : N] = [G_b : N] = 3.
  So Statement 12 cannot certify d >= 4 on the Gross code,
  let alone d = 12.  Approach B is *fundamentally loose* on Gross.

  Lean evidence delivered: attempt.lean (~230 LoC) mechanically
  verifies the subgroup arithmetic and the index parameters via
  `decide`-closed lemmas.  Conditional theorem `gross_TZ_loose`
  formalizes "if Statement 12 holds, then d_0 < 12".

  Combined with Approach A (Camion heuristically loose at ≤ 9),
  the two natural algebraic-bound approaches both demonstrably
  fail for the Gross polynomial pair.  This documents a literature
  gap: no algebraic technique is known to certify d ≥ 4 analytically
  on engineered BB codes.
