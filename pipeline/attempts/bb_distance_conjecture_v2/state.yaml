next_steps: |
  Recommended Tier-3 next moves:
    1. Adversarially test `r2_tz_or_girth_composite` on synthetic
       perturbations of gross, bb_72_12_6, etc. (the survivors that
       weren't strictly tested in this round).
    2. The open structural question: any bound that doesn't see the
       cyclotomic-coset structure of supp(A) is doomed for engineered
       BB codes. The gross polynomial A = x^3+y+y^2 has supp(A) =
       {(3,0), (0,1), (0,2)} — three "orthogonal" monomials that span
       only a partial sublattice. The interaction with B's support
       creates the high-distance structure that TZ/girth bounds miss.
       Future Tier-2 candidates should target this interaction.
    3. Specifically: investigate the "Hartmann-Tzeng" or "Roos" bound
       for multivariate cyclic codes — published in coding theory but
       not (to our knowledge) applied to BB. These give per-pattern
       designed-distance bounds tighter than per-axis BCH.
    4. Do NOT promote any current survivor to Tier 4 (Lean) as a
       claimed novel result. Lean formalization of TZ_lower itself
       (the literature bound) could be a sub-task, but documented
       as a textbook formalization, not a new result.
