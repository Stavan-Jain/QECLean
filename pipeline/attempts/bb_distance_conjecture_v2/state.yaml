purpose: |
  Tier-2 Round 2 candidate distance lower-bound proposals, restricted
  by the rule "RHS must be a weight invariant, not a dimension
  invariant" — the rule that killed Round 1 (see parent attempt
  `bb_distance_conjecture`).

  Round 2 proposes 5 new weight-invariant features and 7 candidate
  bounds:

    1. r2_TZ_lower_recomputed (Lin-Pryadko Stmt 12, literature baseline)
    2. r2_tanner_girth_lower (Sipser-Spielman LDPC bound)
    3. r2_bch_per_axis_lower (BCH, restricted to univariate cyclic)
    4. r2_tz_or_girth_composite (max of TZ + girth — composite of lits)
    5. r2_tz_joint_per_orbit_lower (NEW: per-orbit joint kernel min wt)
    6. r2_tz_safe_lower (TZ capped by textbook bound)
    7. r2_support_indicator_lower (NEW: |V_A ∩ V_B| as denominator)

  Each was evaluated against the 3894-row corpus and the 5-instance
  Bravyi reference table.

verdict_summary: |
  5 candidates survive corpus sweep (no violations). 2 candidates
  falsified.

  Survivors:
    - r2_TZ_lower_recomputed: literature baseline. 4 tight on corpus,
      bound=2 on gross (loose by 10).
    - r2_tanner_girth_lower: 457 tight on corpus (11.7%), bound=2 on
      gross (loose by 10).
    - r2_bch_per_axis_lower: 0 tight on corpus (BCH restricted to
      univariate; multivariate returns 1), bound=1 on gross.
    - r2_tz_or_girth_composite: 458 tight on corpus (11.9%), bound=2
      on gross. Best non-trivial survivor on corpus tightness.
    - r2_tz_safe_lower: identical behavior to TZ_lower.

  Falsified:
    - r2_tz_joint_per_orbit_lower: 115 violations on corpus (2.95%).
      Worst violation: Z_3 × Z_6, A=1+y+y², B=1+x+x², bound=8 > d=2.
      Root cause: joint-per-orbit min weight EXCLUDES cross-orbit
      cancellation, inflating the numerator.
    - r2_support_indicator_lower: 3068 violations (79.7%). Heuristic
      denominator |V_A ∩ V_B| doesn't have a valid derivation.

  **None of the survivors is tight on gross.** Gross d=12 vs all
  surviving candidates' bounds of 1-2. This matches the open question
  in Lin-Pryadko 2306.16400 §IV.F: closing the gap between
  ⌈d/c⌉ ≤ d ≤ d_A^⊥ for c > 1 is unresolved by the surveyed
  literature.

  **Headline recommendation for Tier 3**: r2_tz_or_girth_composite.
  Survives corpus + Bravyi sweeps, has 11.9% tightness rate, and
  combines two valid published lower bounds. It is NOT a new
  mathematical claim (just composition of known bounds), but it's
  the strongest survivor for engineering use. Tier 3 should
  adversarially test it on synthetic perturbations.

