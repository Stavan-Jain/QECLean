code_id: bb_distance_jacobson_conditional
display_name: 'Jacobson-radical distance bound (conditional on non-degenerate BB codes)'
status: heterogeneous-falsified
track: moonshot
parent: bb_distance_conjecture
started_at: 2026-05-26
worktree_branch: bb-lab-v0
phase: tier-3-skeptic-round-2
parent_program: 4-tier BB analytic distance bound (Tier 1 / 2 / 3 / 4)
tier: 3
round: 2
purpose: |
  Round 1 of Tier 3 falsified the universal Jacobson-radical conjecture
  (10.5% corpus violations + bb_72_12_6 outright violation). A quick
  query suggested violations concentrate on **degenerate** codes (where
  ⟨supp(A)⟩ < G or ⟨supp(B)⟩ < G). Round 2 stress-tests the conditional
  version:

      For non-degenerate BB codes,
      d_X(BB(G, A, B)) ≥ Σ_{O ∈ V_A ∩ V_B} |O| · min(μ_O(A), μ_O(B))

  where non-degenerate :≡ ⟨supp(A)⟩ = G AND ⟨supp(B)⟩ = G.

verdict: survives-with-heterogeneous-residual-but-DOMAIN-EXCLUDES-BRAVYI
verdict_summary: |
  Mixed result with a strategic problem.

  Headline numbers (real Jacobson bound, not the k/2 proxy):
    * 3894 corpus rows with d_exact.
    * 1937 non-degenerate (49.7%), 1957 degenerate (50.3%).
    * Non-degenerate violations: 43 (2.2%).
    * Degenerate violations: 364 (18.6%).

  All 43 non-degenerate violators share identical (k=8, d=2, bound=4,
  slack=-2) and have only 4 distinct A-polynomials. 41/43 have
  B = unit · A (a monomial translate); 2/43 have min_wt_ker_B = 2.
  All are weight-2 logical edge cases.

  A natural tightening filter "no weight-≤2 syzygy in F_2[G]²" produces
  ZERO violations on the remaining 1796 non-degenerate corpus rows.
  Clean conditional theorem candidate on this restricted domain.

  HOWEVER: **ALL 5 Bravyi instances are degenerate under the strict
  definition**, with [G:⟨supp(A)⟩] = [G:⟨supp(B)⟩] = 3 in every case
  (Bravyi uses x^3 + y + y^2 style polynomials whose x-axis support
  doesn't generate Z_ℓ). So the conditional conjecture excludes the
  engineering target entirely. Under the alternative joint
  non-degeneracy condition ⟨supp(A) ∪ supp(B)⟩ = G (which Bravyi DOES
  satisfy), bb_72_12_6 outright violates (bound=8 > d=6). The
  tightening filter does not catch bb_72_12_6 because the violation
  mechanism is different (deep-radical over-count of orbit-sum
  Σ|O|·μ_O over the actual dim(ker M_A ∩ ker M_B)).

  Net: the conditional bound has a sharp characterization of its
  violators but cannot be extended to include the Bravyi target
  without immediate falsification.

next_steps: |
  1. DO NOT submit to Tier 4 (Lean) in either form:
     - The strict-non-deg + tightening version is clean on the corpus
       but its domain is gross-empty, so a Lean proof would be
       strategically empty.
     - The joint-non-deg version is falsified by bb_72_12_6.
  2. Document this as a first-class negative output. The structural
     finding "all non-degenerate violators are weight-2 logical edge
     cases with weight-2 syzygies" is useful prior art for future
     Tier-2 candidates.
  3. A future Tier-2 conjecture should target invariants that
     bound *weight* by *weight*, per HANDOFF.md §6h. The single-block
     erasure subsystem distance d_S = d(A, B^T) from Lin-Pryadko
     Statement 5 has this shape and is computable (though as
     expensive as d_exact itself).

