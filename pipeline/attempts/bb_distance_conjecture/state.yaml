code_id: bb_distance_jacobson
display_name: 'Jacobson-radical distance bound conjecture for BB codes'
status: falsified
track: moonshot
started_at: 2026-05-25
worktree_branch: bb-lab-v0
phase: tier-3-skeptic
parent_program: 4-tier BB analytic distance bound (Tier 1 / 2 / 3 / 4)
tier: 3
purpose: |
  Adversarial validation of the Tier-2 candidate conjecture

      d_X(BB(G, A, B)) ≥ Σ_{O ∈ V_A ∩ V_B} |O| · min(μ_O(A), μ_O(B))

  where V_A, V_B are sets of Frobenius orbits on Ĝ_odd where A, B
  respectively vanish, and μ_O is the Jacobson-radical filtration
  depth (operationally: F_{2^|O|}-dim of ker of mult-by-A on the
  local component R_O = F_{2^|O|}[G_2]).

  Tier-3's job is adversarial: hunt for falsifying instances by
  corpus sweep + Bravyi-table check + random sampling.

verdict: FALSIFIED
verdict_summary: |
  The conjecture is falsified.

  Headline numbers:
    * Corpus sweep (3894 instances with d_exact): 407 violations (10.5%),
      max gap = -22 (bound predicts d ≥ 24, actual d = 2).
    * Bravyi-table benchmark: 1 / 5 codes outright VIOLATES the bound
      (bb_72_12_6: bound=8 > d=6). Zero are tight. Gross has gap = 4
      (bound = 8, d = 12) — NOT tight, contrary to the conjecture spec.
    * Adversarial random search: violations found in Z_6 × Z_4 sampling
      at 22% rate.

  The smallest documented falsifying instance:

      G = Z_3 × Z_4,  A = B = 1 + x + x²,  d_X = 2,  bound = 8

  Bound-versus-d gap of -6. Verified by brute-force enumeration of
  weight-1 and weight-2 logicals.

  Root cause: the conjecture overcounts in degenerate cases — codes
  where A and B share algebraic structure (or are even equal), the
  Σ |O|·μ counting represents the F_{2^|O|}-dim of ker(M_A) ∩ ker(M_B)
  in the *semisimple-quotient* sense, but this kernel intersection is
  largely "killed" by the stabilizer rowspan in the CSS quotient
  d_X = minwt(ker(H_Z) \ rowspan(H_X)). The conjecture skips the
  rowspan quotient and is essentially asserting the wrong inequality
  direction.

