next_steps: |
  The conjecture as stated does NOT survive Tier 3. Recommended
  next moves:
    1. NOT to formalize this conjecture in Lean (Tier 4) — it would
       be a contradiction proof, which is uninteresting.
    2. Tier-2 should refine the conjecture. Candidate refinements:
        * Restrict the sum to orbits where (μ_A · μ_B > 0 AND the
          O-isotypic component is *not* killed by the stabilizer
          row space). This requires reasoning about the CSS quotient,
          not just kernels.
        * Replace min(μ_A, μ_B) with min(μ_A, μ_B) - δ_O where δ_O
          is an "overlap" correction reflecting how much of ker M_A
          ∩ ker M_B lies in rowspan(H_X). For A = B this would zero
          out the bound (since every ker-element is also in rowspan).
        * Use the dual classical distance d(C_A^⊥) per orbit as a
          ceiling on the per-orbit contribution: instead of |O|·μ,
          use min(|O|·μ, d_O^⊥) where d_O^⊥ is the dual distance
          of the cyclic-code factor on orbit O.
    3. Document this attempt in `pipeline/research_log.md` as a
       first-class negative result (per the program's
       "failures-are-first-class" principle).
