purpose: |
  Tier 2 round 4 in the 4-tier program toward an analytic distance
  bound for BB codes. Round 3 (HT/Roos) eliminated classical
  univariate-cyclic distance bounds because (i) BB's G_odd is
  non-cyclic for all 5 Bravyi instances, and (ii) F_2[G] is
  non-semisimple for 4 of 5 Bravyi instances. Round 3's recommendation
  was to escalate to the Bernal-Bueno-Carreño-Simón 2016 apparent
  distance for full multivariate abelian codes, which is documented
  in the literature as handling non-cyclic G via hypermatrix
  manipulation and reducing bivariate complexity from exponential
  to linear.

  The candidate bound shape was:

      d_X(BB(A, B))  ≥  min(bbcs_apparent(A, G), bbcs_apparent(B, G))
        when S(A, B) holds,

  where `bbcs_apparent(·)` is the BBCS algorithm and S is some
  structural single-block-dominance condition.

verdict: shelved-paper-doesnt-help
verdict_summary: |
  The BBCS framework explicitly assumes F_q[G] is semisimple
  (gcd(|G|, q) = 1, stated on page 2 of the 2016 paper and reiterated
  in Sections III and V; identical assumption in the 2017 companion
  paper Bernal-Guerreiro-Simón arXiv:1704.03761).

  Four of the five Bravyi BB instances (bb_72_12_6, bb_108_8_10,
  gross, bb_288_12_18) have F_2[G] non-semisimple (|G| even), so
  the framework does not apply. The remaining one (bb_90_8_10,
  |G|=45) is in principle in scope but is a single data point and
  is not the program's engineering target (gross is).

  Per the T2R4 spec's explicit instruction:
    "If the paper turns out to NOT handle non-semisimple F_2[G]
    (which would re-instate the Round 3 obstruction), document
    this and stop. The shelved verdict is the correct output.
    Don't force the implementation."

  The compounding obstruction (HANDOFF §6i: F_2[G] non-semisimple
  AND G_odd non-cyclic AND degenerate supports, all simultaneously)
  reappears unchanged. BBCS resolves the "non-cyclic G" part but
  not the "non-semisimple F_2[G]" part; without the latter the
  framework is silent on gross.

  Companion result: Jitman-Ling 2013 ("Abelian Codes in Principal
  Ideal Group Algebras," IEEE TIT 59(1)) explicitly addresses
  non-semisimple abelian-code bounds and shows (i) any
  non-semisimple bound is derived from the semisimple-quotient
  bound (so never sharper) and (ii) abelian codes in non-semisimple
  PIGAs are asymptotically bad. This is not a missing-paper
  obstruction; it is structural to the character-theoretic /
  Fourier-transform line of multivariate-abelian-code algebra.

  No source code beyond literature notes was written: per the spec,
  "a hand-waved implementation that doesn't match the paper is not
  honest." A clean stop is the correct output.

next_steps: |
  1. DO NOT advance to Tier 3 / Tier 4 on the BBCS candidate.
     - The paper's framework is silent on the engineering target
       (gross). Implementation would either (a) restrict to bb_90
       and not say anything about gross, or (b) apply BBCS to the
       semisimple quotient F_2[G_odd] and produce the same
       trivial-on-gross bound that Round 3 already produced.
  2. Document this as a first-class "literature-doesn't-cover-our-
     regime" outcome. The compounding-obstructions observation from
     Round 3 (HANDOFF §6i; T2R3.4) is now strengthened: the entire
     classical multivariate-abelian-code distance-bound literature
     (Camion 1971 → Sabin-Lomonaco 1992 → Saints-Heegard 1995 →
     BBCS 2016 → BGS 2017) is in the semisimple regime.
  3. Future Tier-2 directions (NOT THIS ROUND):
     - **Bound that handles the radical of F_2[G] for even |G| in
       its own right** — i.e. a weight invariant analogous to the
       Jacobson-radical filtration depth but on the d-side of the
       inequality (cf. HANDOFF §6h: weight invariants only on RHS).
       Conceptually this would be a "depth-weighted distance" that
       sees the radical strata, not just the semisimple quotient.
       No reference found in literature so far.
     - **Cover-graph chain-map transfer bounds (Pesah et al. 2025,
       arXiv:2501.xxxxx)**: if gross is an h-cover of a base BB
       code with known distance d_base, then `d_gross ≥ d_base`
       might hold (this is structural, not algebraic, so dodges
       the semisimple/cyclic obstructions entirely).
     - **Homological-product surgery bounds (Hsieh-Le Gall 2020,
       Kovalev-Pryadko 2013)**: bound `d_X` in terms of the
       homology of the C-block / B-block 2-complex coupled through
       the boundary maps. Algebraically different machinery, no
       reliance on semisimplicity.

