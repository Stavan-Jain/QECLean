notes: |
  First non-CSS code in the repo, fully formalized end-to-end including
  the distance-3 lower bound. Three Core helpers added during Stage 4:

    1. negIdentity_not_mem_of_indep_phase_zero_commute in
       BinarySymplectic/SymplecticSpan.lean (Gap 1: general-form
       replacement for CSS.negIdentity_not_mem_closure_union).
    2. no_weight_two_mem_centralizer_of_anticommute_witness +
       weightTwoAt in Core/CSSDistance.lean (Gap 2: extension of the
       weight-1 helper).
    3. DecidableEq (NQubitPauliGroupElement n) + noncomputable Decidable
       Anticommute in PauliGroup/Commutation.lean (Stage-4 follow-up:
       turn the `Classical.decEq` on NQubitPauliOperator into a
       computable instance, so `decide` reduces equalities of n-qubit
       Pauli operators in the kernel).

  Distance witness is logicalX_w3 = IYYIX (the operator-part of
  logicalX * g1, with phase 2). All 105 weight-{1,2} anticomm witness
  cases close by `decide` thanks to (3).
