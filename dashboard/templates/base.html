<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · QEC pipeline</title>
  <link rel="stylesheet" href="{{ root_prefix }}static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <a href="{{ root_prefix }}index.html">QEC pipeline</a>
      <span class="brand-sub">Lean 4 formalization · catalog-driven</span>
    </div>
    <nav class="site-nav">
      <a href="{{ root_prefix }}index.html" class="{{ 'active' if active == 'overview' }}">Overview</a>
      <a href="{{ root_prefix }}queue/index.html" class="{{ 'active' if active == 'queue' }}">Queue</a>
      <a href="{{ root_prefix }}research/index.html" class="{{ 'active' if active == 'research' }}">Research</a>
      <a href="https://github.com/{{ github_repo }}" class="external">GitHub</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <span>Generated by <code>dashboard/build.py</code> · data from <code>catalog/</code> + <code>pipeline/attempts/</code>.</span>
    <span><a href="https://github.com/{{ github_repo }}">Source</a> · <a href="https://errorcorrectionzoo.org/">Error Correction Zoo</a></span>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
