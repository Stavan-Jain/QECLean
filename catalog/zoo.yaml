  physical: qubits
  logical: qubits
  parameters: {}
  protection_text: "\\subsection{Classification of stabilizers by masking}\nThere exists an efficient classical algorithm\
    \ that tracks information learned by syndrome extraction at each step \\cite{arxiv:2403.04163}.\nThe algorithm performs\
    \ the following classification of stabilizers into unmasked, temporarily masked, and permanently masked stabilizers.\n\
    \nAn unmasked stabilizer is a stabilizer whose outcome can be obtained by measurements.\nIn general, it is not obvious\
    \ to determine if a stabilizer can be unmasked as its eigenvalue may only be revealed indirectly as a product of several\
    \ measurements.\nA temporarily masked stabilizer is a stabilizer whose syndrome cannot be obtained by the given sequence\
    \ but could possibly be obtained with future measurements.\nA permanently masked stabilizer is a stabilizer whose outcome\
    \ is irreversibly lost by the given sequence.\n\nFor a masked stabilizer code with a set \\(U\\) of \\(l\\) masked stabilizers,\
    \ its \\textit{masked distance} is given by:\n\\begin{equation}\n    d_{\\mathrm{u}} = \\min\\:\\text{wt}\\{ \\mathsf{N}(U)\\\
    backslash \\mathsf{G}\\}~.\n\\end{equation}\nAbove, \\(\\mathsf{G}\\) is a gauge group defined from the algorithm that\
    \ depends partly on the freedom in the choice of \\hyperref[topic:destabilizers]{destabilizers} for the temporarily masked\
    \ stabilizers, and partly on the measurement sequence which fixes the \\hyperref[topic:destabilizers]{destabilizers} for\
    \ the permanently masked stabilizers."
