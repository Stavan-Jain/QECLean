- code_id: surface
  short_name: ''
  name: Kitaev surface code
  family: stabilizer/topological/surface/2d_surface
  family_chain:
  - stabilizer
  - topological
  - surface
  - 2d_surface
  - surface
  physical: qubits
  logical: qubits
  parameters: {}
  protection_text: "The original planar code on a square-lattice patch with different boundary conditions on the vertical\
    \ and horizontal edges is a \\([[L^2+(L-1)^2,1,L]]\\) CSS code \\cite{arxiv:quant-ph/9810055}.\nOn a closed orientable\
    \ surface of genus \\(g\\), the codespace has dimension \\(2^{2g}\\), i.e., the code encodes \\(k=2g\\) logical qubits;\
    \ such higher-genus surfaces have been investigated \\cite{arxiv:quant-ph/9811052,arxiv:2307.04418}.\nPlanar patches with\
    \ holes or mixed boundaries can encode multiple logical qubits, and mixed-boundary layouts can reduce planar overhead\
    \ by about a factor of three compared with punctured square-lattice constructions \\cite{arxiv:1606.07116}.\nThe surface\
    \ code has also been shown to be resilient to burst errors \\cite{arxiv:2406.18897}.\n\n\n\\subsection{Topological order\
    \ and gauge-theory analogy}\nWhen treated as ground states of the code Hamiltonian, the code states realize \\(\\mathbb{Z}_2\\\
    ) topological order, a topological phase of matter that also exists in \\(\\mathbb{Z}_2\\) lattice gauge theory \\cite{doi:10.1063/1.1665530}.\n\
    For sufficiently weak local perturbations on closed surfaces, the splitting of this topological ground-state degeneracy\
    \ is exponentially small in the shortest linear lattice size \\cite{arxiv:quant-ph/9707021}.\nThis order does not persist\
    \ at nonzero temperature \\cite{arxiv:1106.6026,arxiv:2310.08639}.\n\nPauli noise operators can be organized into anyonic\
    \ strings of the gauge theory, which cause excitations of the ground-state subspace.\nThe inability of local errors to\
    \ distinguish the codewords translates to the \"topologically protected\" degeneracy of the ground state, rigorously formulated\
    \ by the \\hyperref[topic:tqo]{TQO-1 condition}.\nThe joint \\(+1\\)-eigenspace of the \\(Z\\)-type Paulis corresponds\
    \ to the subspace that conserves \\(\\mathbb{Z}_2\\) flux, while the joint \\(+1\\)-eigenspace of \\(X\\)-type operators\
    \ corresponds to the subspace that preserves \\(\\mathbb{Z}_2\\) gauge symmetry (a one-form symmetry).\nLogical Pauli\
    \ operators correspond to non-contractible Wilson loops in the case of closed boundaries, and to paths connecting different\
    \ types of boundaries in the case of open boundaries.\n\nBehavior under Hamiltonian \\(X\\)-type and \\(Z\\)-type perturbations\
    \ is related to an anisotropic 3D gauge Higgs model \\cite{arxiv:cond-mat/0609048,arxiv:0804.3175,arxiv:0807.0487,arxiv:1201.6409,arxiv:1411.5815}.\n\
    In order to corrupt logical states, any local noise must bring the code state out of the topological order \\cite{arxiv:2310.08639}.\
    \  \n\nAlternatively, there is a general correspondence between stabilizer codes and gauge theory, with the stabilizer\
    \ group playing the role of the gauge group \\cite{arxiv:2412.15317}.\nIn this interpretation, both the \\(X\\) and \\\
    (Z\\) stabilizers are gauge group elements."
  introduced_refs:
