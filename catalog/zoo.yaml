  physical: qubits
  logical: qubits
  parameters: {}
  protection_text: 'CSS phantom codes obey a Hamming-type constraint: if \(d=d_{\mu}\) for \(\mu\in\{X,Z\}\), then \(\eta(2^k-1)\leq
    B(n,d)\), where \(\eta\) counts weight-\(d\) logical operators in a fixed \(\mu\)-type logical equivalence class and \(B(n,d)\leq
    {n \choose d}\) is the maximum size of a binary length-\(n\) code whose pairwise sums have weight at least \(d\) \cite{arxiv:2601.20927}.

    Any qubit phantom code of distance \(d\geq 2\) encoding \(k\geq 2\) logical qubits with \(k\neq 4\) obeys \(n\geq 2^k-1\),
    equivalently \(k\leq \log_2(n+1)\); this parameter bound also holds for non-CSS phantom codes and for qubit subspace or
    subsystem phantom-LU codes \cite{arxiv:2604.15111}.'
