  protection_text: 'The planar 3D surface code family on a cubic lattice of length \(L\) has parameters \([[2L(L-1)^2+L^3,1,d_X=L^2,d_Z=L]]\),
    while the 3D toric code has parameters \([[3L^3,3,d_X=L^2,d_Z=L]]\).

    Rectangular open-boundary 3D versions furnish single-qubit \([[71,1,6]]\), \([[177,1,9]]\), \([[331,1,12]]\), and \([[616,1,16]]\)
    codes, illustrating an \(n\propto 3d^2\) tradeoff between the 2D surface and 4D tesseract families \cite{arxiv:1708.09286}.


    Stability against Hamiltonian perturbations was determined using a tensor-network representation \cite{arxiv:2012.15346}.
    The phase diagram of the perturbed tensor network maps to that of a 3D Ising gauge theory.'
