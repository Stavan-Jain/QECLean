  protection_text: 'Detects errors on \(d-1\) qubits, corrects errors on \(\left\lfloor (d-1)/2 \right\rfloor\) qubits.


    There is the following analogue of the \term{Knill-Laflamme conditions} for subsystem qubit stabilizer codes.

    A set of errors \( \{ E_a \} \) is correctable iff \( E_aE_b \not\in \mathsf{N}(\mathsf{S}) \setminus \mathsf{G} \) for
    all pairs \(a,b\). The distance of the code is the minimal weight of operators in \( \mathsf{N}(\mathsf{S}) \setminus
    \mathsf{G}\).


    \hyperref[topic:quantum-weight-enumerator]{Pure} \([[n,k,g,d]]\) subsystem stabilizer codes codes satisfy \(k+g\leq n-2d+2\),
    and there are no \([[n,n-2d+2,g>0,d]]\) codes \cite[Cor. 12; Thm. 20]{arxiv:quant-ph/0610153}.


    Entropic conditions have been formulated for random projective measurement noise \cite{arxiv:2402.00145}.'
