- code_id: multisector_hypergraph
  short_name: ''
  name: Higher-dimensional homological product code
  family: stabilizer/qldpc/balanced_product/tensor
  family_chain:
  - stabilizer
  - qldpc
  - balanced_product
  - tensor
  - multisector_hypergraph
  physical: qubits
  logical: qubits
  parameters: {}
  protection_text: 'The Künneth formula gives code properties in terms of those of the underlying chain complexes.

    Hypergraph products of multiple classical codes were considered first \cite{arxiv:1512.07081}.

    Homological products of CSS-code and classical chain complexes are used as a building block in Hastings'' weight-reduction
    construction \cite{arxiv:1611.03790}, while later work studied explicit product-code families built from length-two chain
    complexes \cite{arxiv:1805.09271} (which correspond to qubit CSS codes per the \hyperref[topic:CSS-to-homology-correspondence]{qubit
    CSS-to-homology correspondence}).


    Ref. \cite{arxiv:1810.01519} gives explicit parameter formulas for the tensor product \(\mathcal{A}\times\mathcal{K}(P)\)
    of an \(m\)-complex \(\mathcal{A}\) with the 1-complex \(\mathcal{K}(P)\) built from an \(r\times c\) binary matrix \(P\).

    Let \(u=\mathrm{rank}(P)\) and \(\delta\) be the minimum distance of the binary code with parity-check matrix \(P\).

    Writing \(n_j\), \(k_j\), \(d_j\) for the block length, logical dimension, and homological distance of the \(j\)-th sector
    of \(\mathcal{A}\), and primes for the corresponding parameters of the product, the Künneth theorem gives

    \(n_j''=n_{j-1}c+n_j r\) and \(k_j''=k_{j-1}(c-u)+k_j(r-u)\).

    The main result of \cite[Thm. 1]{arxiv:1810.01519} establishes tight bounds on the homological distance:

    \(d_j''=\min(d_j,d_{j-1}\delta)\) when \(r>u\) (P does not have full row rank), and \(d_j''=d_{j-1}\delta\) when \(r=u\)
    (P has full row rank).'
