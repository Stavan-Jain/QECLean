- code_id: qubit_stabilizer
  short_name: ''
  name: Qubit stabilizer code
  family: stabilizer
  family_chain:
  - stabilizer
  - qubit_stabilizer
  physical: qubits
  logical: qubits
  parameters: {}
  protection_text: "Detects errors on up to \\(d-1\\) qubits, and corrects erasure errors on up to \\(d-1\\) qubits.\nThere\
    \ are algorithms to calculate the minimum distance \\cite{arxiv:2109.11996,arxiv:2308.15140,arxiv:2408.10743,arxiv:2409.13017}.\n\
    Computing the distance exactly or approximately is generally \\(NP\\)-complete, and is \\(NP\\)-hard for \\hyperref[topic:degeneracy]{non-degenerate}\
    \ codes \\cite{arxiv:2203.04262}.\nDistance approximation, minimum-weight stabilizer-generator selection, and decoding\
    \ are approximately optimal strategies for various quantum lights-out (QLO) games that can be played on the codes' \\\
    hyperref[topic:encoder-respecting]{encoder-respecting form} \\cite{arxiv:2411.14448}.\n\nThere is the following analogue\
    \ of the \\term{Knill-Laflamme conditions} for qubit stabilizer codes.\nDefine the normalizer \\(\\mathsf{N(S)}\\) of\
    \ \\(\\mathsf{S}\\) to be the set of all Pauli operators that commute with all \\(S\\in\\mathsf{S}\\).\nA stabilizer code\
    \ can correct a Pauli error set \\({\\mathcal{E}}\\) if and only if \\(E^\\dagger F \\notin \\mathsf{N(S)}\\setminus \\\
    mathsf{S}\\) for all \\(E,F \\in {\\mathcal{E}}\\).\n\nThere are subtleties with defining \\hyperref[topic:degeneracy]{degeneracy}\
    \ for non-stabilizer qubit codes with even distance \\cite{preset:GottesmanBook}, but they are resolved for stabilizer\
    \ codes.\nA stabilizer code is \\hyperref[topic:degeneracy]{degenerate} with respect to \\(\\mathcal{E}\\) if and only\
    \ if \\(E^\\dagger F \\in \\mathsf{S}\\) for some Pauli strings \\(E,F \\in \\mathcal{E}\\).\nAs a distance-\\(d\\) code,\
    \ a stabilizer code is degenerate if it admits a non-identity stabilizer whose weight is lower than the distance \\cite{preset:GottesmanBook}.\n\
    Since that stabilizer is in the normalizer, a stabilizer code is \\hyperref[topic:degeneracy]{degenerate} if and only\
    \ if it is \\hyperref[topic:quantum-weight-enumerator]{impure}.\nThe \\hyperref[topic:quantum-weight-enumerator]{pure\
    \ distance} of a qubit stabilizer code is the minimum weight of a non-identity stabilizer, and a qubit stabilizer code\
    \ is \\hyperref[topic:quantum-weight-enumerator]{pure} if the weight of the lowest-weight stabilizer is the code distance.\
    \ \nThere is a toolkit for studying \\hyperref[topic:degeneracy]{degenerate} codes for Pauli channels \\cite{arxiv:quant-ph/0604107}.\n\
    The \\hyperref[topic:quantum-gv-bound]{quantum GV bound} can be extended into a three-way tradeoff between distance, rate,\
    \ and stabilizer weight of a qubit stabilizer code \\cite{arxiv:2411.14448}.  \n\n\\begin{defterm}{Cleaning lemma}\n\\\
    label{topic:cleaning-lemma}\nIf all logical operators act trivially on some subset of qubits in a stabilizer code, then\
    \ any logical Pauli operator can be represented on the complementary qubit subset via a stabilizer.\nMore technically,\
    \ given any subset \\(M\\) of qubits that is correctable (under erasure), any logical Pauli operator \\(P\\) can be \\\
    textit{cleaned off} of \\(M\\) using a stabilizer \\(S\\) such that \\(PS\\) is supported on \\(M^{\\perp}\\).\nMore generally,\
    \ for any \\(M\\), we have \\(g(M)+g(M^{\\perp}) = 2k\\), where \\(g(M)\\) is the number of logical-\\(X\\) and logical-\\\
    (Z\\) Pauli operators supported fully on \\(M\\) (up to stabilizers).\nThe Cleaning Lemma was originally proven \\cite{arxiv:0810.1983},\
    \ where an analogous result is stated for subsystem codes; see also Ref. \\cite{arxiv:2204.04699}.\n\\end{defterm}\n\n\
    Qubit stabilizer codes can be interleaved to protect against burst errors \\cite{arxiv:quant-ph/0002020}.\nEntropic conditions\
    \ have been formulated for random projective measurement noise \\cite{arxiv:2402.00145}.\nAn effective logical channel\
    \ can be derived for qubit stabilizer codes under Pauli noise \\cite{arxiv:2509.16887,arxiv:2601.15505}."
  introduced_refs:
