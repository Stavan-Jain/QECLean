  protection_text: 'If \([n_i, k_i, d_i]\) and \([r_i, k_i^T, d_i^T]\) are the parameters of the codes \(\mathrm{ker}H_i\)
    and \(\mathrm{ker}H_i^T\), respectively, taking \(d_i^T=\infty\) when \(k_i^T=0\), then the hypergraph product has parameters
    \([[n_1 n_2 + r_1 r_2, k_1 k_2 + k_1^T k_2^T, \min(d_1, d_2, d_1^T, d_2^T)]]\).


    An algebraic reformulation of HGP codes, together with rate-improved square, symmetric, and two-tile variants, was given
    in Ref. \cite{arxiv:1202.0928}.

    Using square seed parity-check matrices yields \([[2n_1 n_2,2k_1 k_2,\min(d_1,d_2)]]\), symmetric seeds yield \([[n_1
    n_2,k_1 k_2,\min(d_1,d_2)]]\), and two-tile cyclic constructions yield \([[n_1^2,2k_1^2,d_1]]\); these variants improve
    the rate of the original Tillich-Zemor family by factors up to four at small block length \cite{arxiv:1202.0928}.'
