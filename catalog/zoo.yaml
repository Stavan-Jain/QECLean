- code_id: qubit_css
  short_name: ''
  name: Qubit CSS code
  family: stabilizer
  family_chain:
  - stabilizer
  - qubit_css
  physical: qubits
  logical: qubits
  parameters: {}
  protection_text: 'The quantity \(\min\{\delta_X,\delta_Z\}\) is the CSS code''s \hyperref[topic:quantum-weight-enumerator]{pure
    distance} \cite{arxiv:2209.13474}, and it is equal to the code distance for a \hyperref[topic:degeneracy]{non-degenerate}
    code.

    To find the code distance of a \hyperref[topic:degeneracy]{degenerate} CSS code, we have to first remove the codewords
    of the smaller codes as those codewords correspond to stabilizer generators instead of logical operators.

    The general formulae are

    \begin{align}

    d_{X}&=\min\{ w_H(c) | c \in C_X \setminus C_Z^\perp \} \geq \delta_X \\

    d_{Z}&=\min\{ w_H(c) | c \in C_Z \setminus C_X^\perp \} \geq \delta_Z \\

    d&=\min\{d_X,d_Z\}~,

    \end{align}

    where \(w_H\) is the Hamming weight of a codeword.

    In the homology correspondence, the code distance is equal to the minimum of the combinatorial (\(d-1\))-systole of the
    cellulated \(d\)-dimensional manifold and its dual.


    A CSS code has \textit{stabilizer weight} \(w\) if the highest weight of any stabilizer generator is \(w\), i.e., any
    row of \(H_X\) and \(H_Z\) has weight at most \(w\).

    \textit{Strong CSS codes} are codes for which there exists a set of \(X\) and \(Z\) stabilizer generators of equal weight.

    In the context of comparing weight as well as of determining distances for noise models biased toward \(X\)- or \(Z\)-type
    errors, an extended notation for asymmetric qubit CSS codes is \([[n,k,(d_X,d_Z),w]]\) or \([[n,k,d_X/d_Z,w]]\).


    \begin{defterm}{Steane enlargement}

    \label{topic:steane-enlargement}

    An \([[n,2k-n,d]]\) CSS code can be converted to a \([[n,k+k^{\prime}−n,\min(d,\left\lceil 3d^{\prime}/2\right\rceil )]]\)
    code for particular \(k^{\prime}\) and \(d^{\prime}\) via the Steane enlargement construction \cite{arxiv:quant-ph/9802061,preset:HKSquantum}.

    \end{defterm}'
  introduced_refs:
  - arxiv:quant-ph/9512032
  - doi:10.1103/PhysRevLett.77.793
  - arxiv:quant-ph/9601029
  realizations_count: 2
  has_hardware_demo: true
