  parameters: {}
  protection_text: 'The code protects against Pauli errors. The circuit composed of iSWAP and \(R_X[\pi/2]\) gates on the
    square lattice is a “good scrambler” with non-fractal operator spreading and thus behaves like a random circuit in that
    regard, motivating the use of contiguous code distance as a proxy for code distance.


    For the \(D_4\) example above, the unit cell \(a=2\), and the initial product group is chosen to have code rate \(1/2\).
    The parameters of the code are \([[n, n/2, d(t)]]\), and the contiguous code distance \cite{arxiv:0810.1983} grows linearly
    before saturating at \(O(n)\).


    Selecting the code defined by the stabilizer group at the time when the contiguous distance is maximized and subjecting
    it to random erasures, an optimal threshold of \(1/4\) is achieved for a subset of system sizes \cite{arxiv:1703.01517,arxiv:2010.09775}.

    The subthreshold scaling is competitive with random codes, which obey the random matrix theory ansatz \cite{arxiv:2010.09775}.'
