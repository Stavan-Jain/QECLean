  parameters: {}
  protection_text: 'Given two codes \([[n_i, k_i, d_i, w_i]]\) for \(i\in\{1,2\}\), where \(w_i\) denotes the maximum hamming
    weight of all rows and columns of \(\partial_i\), the homological product code has parameter \([[n=n_1 n_2, k=k_1 k_2,
    d\leq d_1 d_2, w\leq w_1+w_2]]\).

    From this formula, and the fact that a randomly selected boundary operator \(\partial\) yields a CSS code that is good
    with high probability, we see that the product code has \(k=\Theta(n)\) and \(w=O(\sqrt{n})\) with high probability.

    The main result in Ref. \cite{arxiv:1311.0885} is to show that the product code has linear distance with high probability
    as well.

    To sum up, it is shown that we have a family of \([[n,k=c_1 n, d=c_2 n, w=c_3 \sqrt{n}]]\) codes given small enough \(c_1,c_2,c_3\).'
