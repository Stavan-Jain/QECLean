  physical: qubits
  logical: qubits
  parameters: {}
  protection_text: 'For an additive self-orthogonal code \(C \subseteq \mathbb{F}_4^n\), the resulting qubit stabilizer code
    has distance

    \begin{align}

    d=\min\{\operatorname{wt}(v):v \in C^{\perp}\setminus C\}~,

    \end{align}

    where \(\perp\) denotes duality under the trace inner product \cite[Thm. 2]{arxiv:quant-ph/9608006}\cite{arxiv:quant-ph/0005008}.

    The distance \(d_C\) of the classical code is the Hermitian code''s \hyperref[topic:quantum-weight-enumerator]{pure distance},
    and it is equal to the code distance for a \hyperref[topic:degeneracy]{non-degenerate} code \cite{arxiv:2312.06504}.

    There is an equivalence between \hyperref[topic:quantum-weight-enumerator]{pure} \([[n,n-2k]]\) Hermitian qubit codes
    and certain sets of points in projective space \(PG(k-1,4)\) \cite[Thm. 2.8]{doi:10.2140/iig.2008.6.53}.'
