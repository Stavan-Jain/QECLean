  parameters: {}
  protection_text: 'Protects against both physical qubit and syndrome measurement errors.

    An \([[n,k,d:r]]\) QDS code corrects any combination of \(t_{\mathrm{D}}\) data-qubit errors and \(t_{\mathrm{S}}\) syndrome-bit
    errors whenever \(t_{\mathrm{D}}+t_{\mathrm{S}}<d/2\), and its distance cannot exceed that of the underlying stabilizer
    code \cite{arxiv:1907.01393}.


    Random QDS codes with \(r\leq n-k\) can attain the stabilizer Gilbert-Varshamov bound \cite[Thm. 12]{arxiv:1907.01393}.

    Quantum Singleton bounds, quantum Hamming bounds, and \hyperref[topic:quantum-weight-enumerator]{quantum MacWilliams identities}
    can be extended to QDS codes.

    Single-error-correcting QDS codes stemming from \hyperref[topic:quantum-weight-enumerator]{impure} stabilizer codes must
    satisfy a variant of the quantum Hamming bound \cite{arxiv:2302.01527}.'
