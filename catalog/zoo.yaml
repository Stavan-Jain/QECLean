  physical: qubits
  logical: qubits
  parameters: {}
  protection_text: 'For the minimal length-one chain complex associated with a classical \([n, k, d]\) code, the double homological
    product yields a quantum code with parameters \([[n^4 + 4n^2(n-k)^2 + (n-k)^4, k^4, \geq d]]\) and single-shot distance
    \(d_{\text{ss}}=\infty\) \cite{arxiv:1805.09271}.


    In this minimal-input setting, the Campbell double homological product code is \((d, f)\)-sound with \(f(x) = x^3/4\),
    meaning that small syndromes can be explained by errors whose weight grows at most cubically in the syndrome weight \cite{arxiv:1805.09271}.
    Its check redundancy is bounded by \(<2\), and the construction preserves LDPC properties if the original classical-code
    family is LDPC.'
